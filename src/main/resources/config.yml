# ═══════════════════════════════════════════════════
# Xbp — 模块化功能插件
# ═══════════════════════════════════════════════════

# ──────────────────────────────────────────────
# 功能总开关（每个功能独立控制）
# enabled: true  → 启用
# enabled: false → 关闭，零性能开销（不注册 Listener）
# ──────────────────────────────────────────────
features:
  respawn:
    enabled: true
  antitrample:
    enabled: true
  pvp:
    enabled: true

# ──────────────────────────────────────────────
# respawn 功能：复活属性给予
# 玩家死亡复活后，根据权限自动设置血量、饱食度、药水效果
# ──────────────────────────────────────────────
respawn:

  # 独立 OP 组开关
  # true  → OP 玩家强制使用 op-group 配置，跳过普通权限匹配
  # false → OP 玩家同普通玩家一样走权限匹配
  enable-op-group: true

  # OP 专用配置（仅 enable-op-group: true 时生效）
  op-group:
    health: 40.0
    food: 20
    effects:
      regeneration:
        duration: 600
        amplifier: 3
      speed:
        duration: 600
        amplifier: 1
      fire_resistance:
        duration: 600
        amplifier: 0
      resistance:
        duration: 600
        amplifier: 1

  # ── 普通权限组（按权限节点做最长匹配） ──
  # default 组为兜底组，不需要 permission 字段
  # 其他组的 permission 字符串越长，优先级越高
  groups:
    default:
      health: 20.0
      food: 20
      effects: []

    vip:
      permission: "respawn.vip"
      health: 30.0
      food: 20
      effects:
        regeneration:
          duration: 100
          amplifier: 1

    vip_plus:
      permission: "respawn.vip.plus"
      health: 40.0
      food: 20
      effects:
        regeneration:
          duration: 200
          amplifier: 2
        damage_resistance:
          duration: 300
          amplifier: 0

    admin:
      permission: "respawn.admin"
      health: 40.0
      food: 20
      effects:
        regeneration:
          duration: 600
          amplifier: 3
        speed:
          duration: 600
          amplifier: 1
        fire_resistance:
          duration: 600
          amplifier: 0

# ──────────────────────────────────────────────
# pvp 功能：PvP 检测执行命令
# 检测玩家攻击玩家，根据双方权限执行自定义命令
# 占位符：
#   %pvp_attacker%  — 攻击者玩家名
#   %pvp_victim%    — 被攻击者玩家名
#   %pvp_damage%    — 伤害数值
#   %pvp_weapon%    — 武器名称
#   以及所有 PlaceholderAPI 标准占位符（%player%, %player_health% 等）
# ──────────────────────────────────────────────
pvp:

  # 是否取消原版伤害（true=事件取消，由自定义命令接管；false=保留原版伤害，命令额外执行）
  # 默认关闭
  cancel-vanilla-damage: false

  # 权限组（最长权限匹配）
  groups:
    default:
      # default 组不需要 permission 字段
      # 攻击者攻击别人时执行的命令
      attacker-commands: []
      # 被攻击时执行的命令
      victim-commands:
        - "damage %player% 2"

    warrior:
      permission: "pvp.warrior"
      attacker-commands:
        - "say &c我攻击了 %pvp_victim% ，造成 %pvp_damage% 伤害，武器：%pvp_weapon%"
        - "give %player% minecraft:cooked_beef 1"
      victim-commands:
        - "damage %player% 4"

    tank:
      permission: "pvp.tank"
      attacker-commands: []
      victim-commands:
        - "effect give %player% minecraft:absorption 10 1"
