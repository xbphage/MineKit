# ═══════════════════════════════════════════════════
# MineKit — 模块化功能插件
# ═══════════════════════════════════════════════════

config-version: 2
debug: false

features:
  respawn:
    启用: true
  antitrample:
    启用: false
  pvp:
    启用: false
  deathback:
    启用: false
  report:
    启用: false
  redemption:
    启用: false

respawn:
  频率惩罚基数:
    一小时:
      0:
        血量: 20.0
        饱食度: 20
        效果: []
        消息: "你重生了"
      1:
        血量: 19.0
        饱食度: 18
        效果:
          - ["slowness", "3", "0"]
        消息: "你感到死亡的气息还未完全散去"
      3:
        血量: 17.0
        饱食度: 15
        效果:
          - ["weakness", "15", "0"]
          - ["mining_fatigue", "15", "0"]
        消息: "连续死亡让你感到虚弱"
      5:
        血量: 14.0
        饱食度: 12
        效果:
          - ["nausea", "3", "1"]
          - ["weakness", "30", "1"]
          - ["mining_fatigue", "30", "1"]
        消息: "你连续重生，感到有点疲惫"
      8:
        血量: 12.0
        饱食度: 10
        效果:
          - ["nausea", "5", "1"]
          - ["weakness", "60", "1"]
          - ["mining_fatigue", "60", "1"]
        消息: "你连续重生，感到力不从心"
      12:
        血量: 8.0
        饱食度: 6
        效果:
          - ["blindness", "5", "1"]
          - ["weakness", "90", "1"]
          - ["mining_fatigue", "120", "2"]
          - ["slowness", "5", "1"]
        消息: "你连续重生，感到眼前一黑"
  权限:
    vip:
      权限: "respawn.vip"
      偏移: -1

redemption:
  物品:
    - 物品: "minecraft:diamond"
      数量: 3
      降低: 5

pvp:
  取消原版伤害: false
  启用独立OP组: true
  OP组:
    攻击者命令: []
    被攻击者命令: []
  权限组:
    default:
      攻击者命令: []
      被攻击者命令: []
    vip:
      权限: "pvp.vip"
      攻击者命令:
        - "give %player% minecraft:golden_apple 1"
        - "say &e我攻击了 %pvp_victim%！"
      被攻击者命令:
        - "damage %player% 4"
        - "effect give %player% minecraft:slowness 3 1"
