# ═══════════════════════════════════════════════════
# MineKit — 模块化功能插件
# ═══════════════════════════════════════════════════

config-version: 2

features:
  respawn:
    启用: false        # 重生频率惩罚：按60分钟内和本天死亡次数递减血量、饱食度、效果
  antitrample:
    启用: false        # 农田防踩踏：阻止耕地因踩踏退化为泥土
  pvp:
    启用: false        # PvP 检测执行命令：玩家攻击玩家时根据权限执行自定义命令
  killstats:
    启用: false        # 击杀统计：查看击杀/死亡排行及击杀明细
  deathback:
    启用: false        # 死亡回溯：死亡后点击聊天栏按钮传送回死亡点
  report:
    启用: false        # 命令通报：非管理员执行命令时自动通报给在线管理员

respawn:
  启用独立OP组: true
  频率惩罚基数:
    一小时:
      0:
        血量: 20.0
        饱食度: 20
        效果:
          - ["speed", 60, 1]
          - ["haste", 60, 1]
          - ["strength", 60, 1]
          - ["regeneration", 30, 1]
          - ["night_vision", 30, 1]
          - ["glowing", 60, 1]
        消息: "你重生了，身体回到了巅峰时期，你感受到身体里有力量在流动"
      3:
        血量: 20.0
        饱食度: 20
        效果: []
        消息: "你重生了"
      5:
        血量: 18.0
        饱食度: 18
        效果:
          - ["nausea", 2, 1]
          - ["weakness", 7, 1]
          - ["mining_fatigue", 7, 1]
        消息: "你连续重生，感到有点疲惫"
      7:
        血量: 16.0
        饱食度: 16
        效果:
          - ["nausea", 3, 1]
          - ["weakness", 10, 1]
          - ["mining_fatigue", 10, 1]
        消息: "你连续重生，感到有点困倦"
      10:
        血量: 12.0
        饱食度: 10
        效果:
          - ["nausea", 5, 1]
          - ["weakness", 60, 1]
          - ["mining_fatigue", 30, 1]
        消息: "你连续重生，感到力不从心"
      15:
        血量: 10.0
        饱食度: 8
        效果:
          - ["blindness", 5, 1]
          - ["weakness", 90, 1]
          - ["mining_fatigue", 60, 1]
          - ["slowness", 3, 1]
        消息: "你连续重生，感到眼前一黑"
    本天:
      0: {血量: 30, 饱食度: 10}
      3: {血量: 22, 饱食度: 8}
      6: {血量: 16, 饱食度: 6}
      10: {血量: 12, 饱食度: 4}
      15: {血量: 8, 饱食度: 2}
  权限:
    vip:
      权限: "respawn.vip"
      偏移: -1
    op:
      完全免疫: true

pvp:
  取消原版伤害: false
  启用独立OP组: true
  OP组:
    攻击者命令: []
    被攻击者命令: []
  权限组:
    default:
      攻击者命令: []
      被攻击者命令: []
    vip:
      权限: "pvp.vip"
      攻击者命令:
        - "give %player% minecraft:golden_apple 1"
        - "say &e我攻击了 %pvp_victim%！"
      被攻击者命令:
        - "damage %player% 4"
        - "effect give %player% minecraft:slowness 3 1"
