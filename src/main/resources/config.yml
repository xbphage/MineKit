# ═══════════════════════════════════════════════════
# MineKit — 模块化功能插件
# ═══════════════════════════════════════════════════

config-version: 2

features:
  respawn:
    启用: false
  antitrample:
    启用: false
  pvp:
    启用: false
  deathback:
    启用: false
  report:
    启用: false
  redemption:
    启用: false

respawn:
  启用独立OP组: true
  频率惩罚基数:
    一小时:
      0:
        血量: 20.0
        饱食度: 20
        效果:
          - ["speed", 60, 1]
          - ["haste", 60, 1]
          - ["strength", 60, 1]
          - ["regeneration", 30, 1]
          - ["night_vision", 30, 1]
          - ["glowing", 60, 1]
        消息: "你重生了，身体回到了巅峰时期，你感受到身体里有力量在流动"
      3:
        血量: 20.0
        饱食度: 20
        效果: []
        消息: "你重生了"
      5:
        血量: 18.0
        饱食度: 18
        效果:
          - ["nausea", 2, 1]
          - ["weakness", 7, 1]
          - ["mining_fatigue", 7, 1]
        消息: "你连续重生，感到有点疲惫"
      7:
        血量: 16.0
        饱食度: 16
        效果:
          - ["nausea", 3, 1]
          - ["weakness", 10, 1]
          - ["mining_fatigue", 10, 1]
        消息: "你连续重生，感到有点困倦"
      10:
        血量: 12.0
        饱食度: 10
        效果:
          - ["nausea", 5, 1]
          - ["weakness", 60, 1]
          - ["mining_fatigue", 30, 1]
        消息: "你连续重生，感到力不从心"
      15:
        血量: 10.0
        饱食度: 8
        效果:
          - ["blindness", 5, 1]
          - ["weakness", 90, 1]
          - ["mining_fatigue", 60, 1]
          - ["slowness", 3, 1]
        消息: "你连续重生，感到眼前一黑"
  权限:
    vip:
      权限: "respawn.vip"
      偏移: -1
    op:
      完全免疫: true

redemption:
  物品:
    - 物品: "minecraft:diamond"
      数量: 3
      降低: 5

pvp:
  取消原版伤害: false
  启用独立OP组: true
  OP组:
    攻击者命令: []
    被攻击者命令: []
  权限组:
    default:
      攻击者命令: []
      被攻击者命令: []
    vip:
      权限: "pvp.vip"
      攻击者命令:
        - "give %player% minecraft:golden_apple 1"
        - "say &e我攻击了 %pvp_victim%！"
      被攻击者命令:
        - "damage %player% 4"
        - "effect give %player% minecraft:slowness 3 1"
