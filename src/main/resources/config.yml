# ═══════════════════════════════════════════════════
# Xbp — 模块化功能插件
# ═══════════════════════════════════════════════════

# ──────────────────────────────────────────────
# 功能总开关（每个功能独立控制）
# ──────────────────────────────────────────────
features:
  respawn:
    启用: true
  antitrample:
    启用: true
  pvp:
    启用: true

# ──────────────────────────────────────────────
# respawn 功能：复活属性给予
# 玩家死亡复活后，根据权限自动设置血量、饱食度、药水效果
# ──────────────────────────────────────────────
respawn:

  # 独立 OP 组开关
  # true  → OP 玩家强制使用 OP组 配置，跳过普通权限匹配
  # false → OP 玩家同普通玩家一样走权限匹配
  启用独立OP组: true

  # OP 专用配置（仅 启用独立OP组: true 时生效）
  OP组:
    血量: 40.0
    饱食度: 20
    效果:
      regeneration:
        持续时间: 600
        等级: 3
      speed:
        持续时间: 600
        等级: 1
      fire_resistance:
        持续时间: 600
        等级: 0
      resistance:
        持续时间: 600
        等级: 1

  # ── 普通权限组（按权限节点做最长匹配） ──
  # default 组为兜底组，不需要 权限 字段
  # 其他组的 权限 字符串越长，优先级越高
  权限组:
    default:
      血量: 20.0
      饱食度: 20
      效果: []

    vip:
      权限: "respawn.vip"
      血量: 30.0
      饱食度: 20
      效果:
        regeneration:
          持续时间: 100
          等级: 1

    vip_plus:
      权限: "respawn.vip.plus"
      血量: 40.0
      饱食度: 20
      效果:
        regeneration:
          持续时间: 200
          等级: 2
        damage_resistance:
          持续时间: 300
          等级: 0

    admin:
      权限: "respawn.admin"
      血量: 40.0
      饱食度: 20
      效果:
        regeneration:
          持续时间: 600
          等级: 3
        speed:
          持续时间: 600
          等级: 1
        fire_resistance:
          持续时间: 600
          等级: 0

# ──────────────────────────────────────────────
# pvp 功能：PvP 检测执行命令
# 检测玩家攻击玩家，根据双方权限执行自定义命令
# 占位符：
#   %pvp_attacker%  — 攻击者玩家名
#   %pvp_victim%    — 被攻击者玩家名
#   %pvp_damage%    — 伤害数值
#   %pvp_weapon%    — 武器名称
#   以及所有 PlaceholderAPI 标准占位符（%player%, %player_health% 等）
# ──────────────────────────────────────────────
pvp:

  # 是否取消原版伤害（true=事件取消，由自定义命令接管；false=保留原版伤害，命令额外执行）
  # 默认关闭
  取消原版伤害: false

  # 权限组（最长权限匹配）
  权限组:
    default:
      # default 组不需要 权限 字段
      # 攻击者攻击别人时执行的命令
      攻击者命令: []
      # 被攻击时执行的命令
      被攻击者命令:
        - "damage %player% 2"

    warrior:
      权限: "pvp.warrior"
      攻击者命令:
        - "say &c我攻击了 %pvp_victim% ，造成 %pvp_damage% 伤害，武器：%pvp_weapon%"
        - "give %player% minecraft:cooked_beef 1"
      被攻击者命令:
        - "damage %player% 4"

    tank:
      权限: "pvp.tank"
      攻击者命令: []
      被攻击者命令:
        - "effect give %player% minecraft:absorption 10 1"
