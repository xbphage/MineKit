# ═══════════════════════════════════════════════════
# Xbp — 模块化功能插件
# ═══════════════════════════════════════════════════

# ──────────────────────────────────────────────
# 功能总开关（所有功能默认关闭，按需开启）
# ──────────────────────────────────────────────
features:
  respawn:
    启用: false        # 复活属性给予：死亡后设置血量、饱食度、药水效果
  antitrample:
    启用: false        # 农田防踩踏：阻止耕地退化
  pvp:
    启用: false        # PvP 检测：根据权限执行自定义命令

# ──────────────────────────────────────────────
# respawn 功能：复活属性给予
# 效果格式: [效果名, 持续时间(秒), 等级]
# 效果名可使用常见名（如 mining_fatigue）或 Bukkit 原名（如 SLOW_DIGGING）
# ──────────────────────────────────────────────
respawn:

  # 独立 OP 组开关
  # true  → OP 玩家强制使用 OP组 配置，跳过普通权限匹配
  # false → OP 玩家同普通玩家一样走权限匹配
  启用独立OP组: true

  # OP 组配置
  OP组:
    血量: 20.0
    饱食度: 20
    效果: []

  # 普通权限组
  权限组:
    default:
      血量: 30.0
      饱食度: 10
      效果:
        - ["mining_fatigue", 30, 1]
        - ["weakness", 180, 1]
        - ["nausea", 5, 1]

    vip:
      权限: "respawn.vip"
      血量: 40.0
      饱食度: 20
      效果: []

# ──────────────────────────────────────────────
# pvp 功能：PvP 检测执行命令
# 检测玩家攻击玩家，根据双方权限执行自定义命令
# 占位符：%pvp_attacker% %pvp_victim% %pvp_damage% %pvp_weapon%
# 支持所有 PlaceholderAPI 标准占位符
# ──────────────────────────────────────────────
pvp:

  # 是否取消原版伤害
  取消原版伤害: false

  # 独立 OP 组开关
  启用独立OP组: true

  # OP 组配置
  OP组:
    攻击者命令: []
    被攻击者命令: []

  # 普通权限组
  权限组:
    default:
      攻击者命令: []
      被攻击者命令: []

    vip:
      权限: "pvp.vip"
      # 示例：攻击者获得金苹果，被攻击者受到伤害并减速
      攻击者命令:
        - "give %player% minecraft:golden_apple 1"
        - "say &e我攻击了 %pvp_victim%！"
      被攻击者命令:
        - "damage %player% 4"
        - "effect give %player% minecraft:slowness 3 1"
